name: Deploy to Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set deployment variables
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "ENVIRONMENT=production" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "ENVIRONMENT=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          fi

      - name: Log deployment info
        run: |
          echo "### Deployment Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ steps.vars.outputs.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.vars.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          VERSION: ${{ steps.vars.outputs.VERSION }}
          ENVIRONMENT: ${{ steps.vars.outputs.ENVIRONMENT }}
        run: |
          ssh $DEPLOY_USER@$DEPLOY_HOST << 'EOF'
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Pull latest code
            git fetch --all --tags
            git checkout ${{ steps.vars.outputs.VERSION }}

            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker compose pull

            # Run database migrations
            docker compose run --rm backend alembic upgrade head

            # Restart services with zero downtime
            docker compose up -d --no-deps --build

            # Clean up old images
            docker image prune -f

            echo "Deployment completed successfully"
          EOF

      - name: Health check
        run: |
          echo "Waiting for services to be healthy..."
          sleep 30

          # Check backend health
          curl -f ${{ secrets.BACKEND_URL }}/api/v1/health/ || exit 1

          # Check frontend health
          curl -f ${{ secrets.FRONTEND_URL }} || exit 1

          echo "✅ All services are healthy" >> $GITHUB_STEP_SUMMARY

      - name: Notify deployment success
        if: success()
        run: |
          echo "### ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "Deployed version ${{ steps.vars.outputs.VERSION }} to ${{ steps.vars.outputs.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "### ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "Failed to deploy version ${{ steps.vars.outputs.VERSION }} to ${{ steps.vars.outputs.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY

      - name: Rollback on failure
        if: failure()
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh $DEPLOY_USER@$DEPLOY_HOST << 'EOF'
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "Rolling back to previous version..."
            docker compose down
            git checkout HEAD~1
            docker compose up -d

            echo "Rollback completed"
          EOF
