# Redis 配置文件

# 监听地址
bind 0.0.0.0

# 保护模式（开发环境可关闭）
protected-mode no

# 监听端口
port 6379

# TCP 连接数
tcp-backlog 511

# 超时时间（0 表示不超时）
timeout 0

# TCP keepalive
tcp-keepalive 300

# 守护进程模式（Docker 中应为 no）
daemonize no

# 日志级别
loglevel notice

# 数据库数量
databases 16

# 持久化配置
save 900 1
save 300 10
save 60 10000

# 持久化失败时停止写入
stop-writes-on-bgsave-error yes

# 压缩 RDB 文件
rdbcompression yes

# RDB 文件校验
rdbchecksum yes

# RDB 文件名
dbfilename dump.rdb

# 工作目录
dir /data

# 最大内存（根据实际情况调整）
maxmemory 256mb

# 内存淘汰策略
maxmemory-policy allkeys-lru

# AOF 持久化（可选）
appendonly no
