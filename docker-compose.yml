services:
  # Frontend 服务 - Next.js 15
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: jules-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/api/v1
    command: npm run dev
    depends_on:
      - backend
    networks:
      - jules-network
    restart: unless-stopped

  # Backend 服务 - FastAPI + Python 3.11
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: jules-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/.pytest_cache:/app/.pytest_cache
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://jules:jules_password@postgres:5432/jules_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - SECRET_KEY=dev-secret-key-change-in-production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=jules-dev
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jules-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: jules-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules_password
      - POSTGRES_DB=jules_db
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    networks:
      - jules-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jules -d jules_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存和任务队列
  redis:
    image: redis:7-alpine
    container_name: jules-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./backend/config/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - jules-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Celery Worker - 异步任务处理
  celery-worker:
    profiles:
      - workers
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jules-celery-worker
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://jules:jules_password@postgres:5432/jules_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      - backend
      - redis
      - postgres
    networks:
      - jules-network
    restart: unless-stopped

  # Celery Beat - 定时任务调度器（可选）
  celery-beat:
    profiles:
      - workers
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jules-celery-beat
    volumes:
      - ./backend:/app
      - celery_beat_data:/var/lib/celery
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://jules:jules_password@postgres:5432/jules_db
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ENVIRONMENT=development
    command: celery -A app.tasks.celery_app beat --loglevel=info --pidfile=/var/lib/celery/celerybeat.pid --schedule=/var/lib/celery/celerybeat-schedule
    depends_on:
      - backend
      - redis
    networks:
      - jules-network
    restart: unless-stopped

networks:
  jules-network:
    driver: bridge
    name: jules-network

volumes:
  postgres_data:
    name: jules-postgres-data
  redis_data:
    name: jules-redis-data
  celery_beat_data:
    name: jules-celery-beat-data
