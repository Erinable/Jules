name: Pull Request Checks

on:
  pull_request:
    branches: [main, develop]

jobs:
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check PR title
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"

          # Check if title follows conventional commits format
          if [[ ! $PR_TITLE =~ ^(feat|fix|docs|style|refactor|perf|test|chore|ci|build)(\(.+\))?: ]]; then
            echo "❌ PR title must follow conventional commits format"
            echo "Examples:"
            echo "  - feat: add new feature"
            echo "  - fix: resolve bug in authentication"
            echo "  - docs: update API documentation"
            exit 1
          fi

          echo "✅ PR title follows conventional commits format"

      - name: Check PR description
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"

          if [ -z "$PR_BODY" ]; then
            echo "❌ PR description is required"
            exit 1
          fi

          # Check minimum length
          BODY_LENGTH=${#PR_BODY}
          if [ $BODY_LENGTH -lt 50 ]; then
            echo "❌ PR description is too short (minimum 50 characters)"
            exit 1
          fi

          echo "✅ PR description looks good"

      - name: Check for breaking changes
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"

          if [[ $PR_BODY == *"BREAKING CHANGE"* ]] || [[ $PR_BODY == *"breaking change"* ]]; then
            echo "⚠️  This PR contains breaking changes"
            echo "Please ensure:"
            echo "  1. Breaking changes are clearly documented"
            echo "  2. Migration guide is provided"
            echo "  3. Version number will be bumped appropriately"
          fi

  size-check:
    name: PR Size Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          FILES_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
          LINES_ADDED=$(git diff --shortstat origin/${{ github.base_ref }}...HEAD | grep -oP '\d+(?= insertion)' || echo 0)
          LINES_DELETED=$(git diff --shortstat origin/${{ github.base_ref }}...HEAD | grep -oP '\d+(?= deletion)' || echo 0)

          echo "### PR Size Analysis" >> $GITHUB_STEP_SUMMARY
          echo "- Files changed: $FILES_CHANGED" >> $GITHUB_STEP_SUMMARY
          echo "- Lines added: $LINES_ADDED" >> $GITHUB_STEP_SUMMARY
          echo "- Lines deleted: $LINES_DELETED" >> $GITHUB_STEP_SUMMARY

          TOTAL_CHANGES=$((LINES_ADDED + LINES_DELETED))

          if [ $TOTAL_CHANGES -gt 1000 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️  **Large PR Warning**: This PR has $TOTAL_CHANGES line changes" >> $GITHUB_STEP_SUMMARY
            echo "Consider breaking it into smaller PRs for easier review" >> $GITHUB_STEP_SUMMARY
          fi

  conflict-check:
    name: Merge Conflict Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for merge conflicts
        run: |
          git fetch origin ${{ github.base_ref }}

          if git merge-tree $(git merge-base HEAD origin/${{ github.base_ref }}) HEAD origin/${{ github.base_ref }} | grep -q "^<<<<<"; then
            echo "❌ This PR has merge conflicts with ${{ github.base_ref }}"
            echo "Please resolve conflicts before merging"
            exit 1
          fi

          echo "✅ No merge conflicts detected"

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0

  label-check:
    name: Check PR Labels
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check for required labels
        run: |
          LABELS="${{ join(github.event.pull_request.labels.*.name, ',') }}"

          if [ -z "$LABELS" ]; then
            echo "⚠️  No labels applied to this PR"
            echo "Please add appropriate labels:"
            echo "  - Type: feature, bugfix, enhancement, documentation"
            echo "  - Priority: critical, high, medium, low"
            echo "  - Area: backend, frontend, database, ci"
          else
            echo "✅ Labels applied: $LABELS"
          fi

  all-checks-complete:
    name: All PR Checks Complete
    runs-on: ubuntu-latest
    needs: [pr-validation, size-check, conflict-check, dependency-review, label-check]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          if [[ "${{ needs.pr-validation.result }}" == "failure" ]] || \
             [[ "${{ needs.size-check.result }}" == "failure" ]] || \
             [[ "${{ needs.conflict-check.result }}" == "failure" ]] || \
             [[ "${{ needs.dependency-review.result }}" == "failure" ]]; then
            echo "❌ Some PR checks failed"
            exit 1
          fi

          echo "✅ All PR checks passed"
